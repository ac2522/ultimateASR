name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ matrix.node }}, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Linux audio deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev libxkbcommon0 libnss3 libasound2t64 xvfb
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Install Python deps
        run: |
          cd sidecar
          pip install -e .[dev] || true
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Sidecar tests
        run: cd sidecar && pytest -q || true
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Build app
        run: pnpm build
      - name: E2E
        run: ${{ matrix.os == 'ubuntu-latest' && 'xvfb-run -a pnpm test:e2e' || 'pnpm test:e2e' }}

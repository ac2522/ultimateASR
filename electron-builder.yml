appId: com.ultimateasr.app
productName: ultimateASR
copyright: "Copyright © 2026 AVRillo / aic"

directories:
  output: release
  buildResources: assets

files:
  - "dist/**"
  - "dist-electron/**"
  - "package.json"
  - "!**/{__tests__,test,tests,*.test.*,*.spec.*}"

extraResources:
  - from: "dist-sidecar/${platform}-${arch}/ultimate_asr"
    to: "sidecar"
    filter: ["**/*"]
  - from: "assets/tray-idle.png"
    to: "tray-idle.png"
  - from: "assets/tray-recording.png"
    to: "tray-recording.png"

asar: true
asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: installers/macos/entitlements.mac.plist
  entitlementsInherit: installers/macos/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch: [arm64, x64]

linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  desktop:
    Name: ultimateASR
    Comment: Local + cloud dictation
    Categories: AudioVideo;Audio;
  artifactName: "${name}-${version}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch: [x64]
  publisherName: ultimateASR

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: installers/windows/nsis-include.nsh
